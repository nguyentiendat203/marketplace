spring.application.name=marketplace

#config database
###
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# Hibernate/JPA Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# TODO: change back to 'update' after first successful startup with clean schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.security.jwt.secret-key=${JWT_SECRET_KEY}
app.security.jwt.access-token-validity-in-seconds=3600
app.security.jwt.refresh-token-validity-in-seconds=8640000

# Spring Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Custom Application Mail Properties
application.mail.activation-ttl-minutes=15
application.mail.base-url=http://localhost:8080

minio.endpoint=http://localhost:9000
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.buckets.products=products
minio.buckets.kyc-vault=kyc-vault

