services:
  db-mysql:
    image: postgres:16-alpine
    container_name: my_postgres_db
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: marketplace_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
